<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST UMROH | Segera Hadir</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dominant-white: #FFFFFF;
            --accent-blue: #005B96; 
            --accent-blue-hover: #004370;
            --text-dark: #2C3E50;
            --text-muted: #6C7A89;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        .bg-image {
            background-image: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.25)), url('/images/image-1.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .content-box {
            background: var(--dominant-white);
            padding: 3.5rem 2.5rem;
            border-radius: 20px;
            border-top: 5px solid var(--accent-blue);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            max-width: 750px;
            width: 100%;
            text-align: center;
            color: var(--text-dark);
        }

        .logo-img {
            max-width: 120px;
            height: auto;
            margin-bottom: 1rem;
        }

        .brand-name {
            font-family: 'Amiri', serif;
            color: var(--accent-blue);
            font-size: 3.2rem;
            font-weight: 700;
            margin-bottom: 0;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .main-heading {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            line-height: 1.4;
            color: var(--text-dark);
        }

        .description {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
            line-height: 1.6;
        }
        .social-icons {
            margin-bottom: 2rem;
        }

        .social-icons a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background-color: #f0f7fb;
            color: var(--accent-blue);
            border: 1px solid rgba(0, 91, 150, 0.2);
            border-radius: 50%;
            font-size: 1.2rem;
            margin: 0 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            background-color: var(--accent-blue);
            color: var(--dominant-white);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 91, 150, 0.3);
        }

        .btn-contact {
            background-color: var(--accent-blue);
            color: var(--dominant-white);
            font-weight: 600;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-contact:hover {
            background-color: var(--accent-blue-hover);
            color: var(--dominant-white);
            box-shadow: 0 5px 15px rgba(0, 91, 150, 0.4);
        }

        .pulse-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--accent-blue);
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        @media (max-width: 576px) {
            .brand-name { font-size: 2.2rem; }
            .main-heading { font-size: 1.4rem; }
            .content-box { padding: 2.5rem 1.5rem; }
            .logo-img { max-width: 90px; }
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="container d-flex justify-content-center">
            <div class="content-box">
                
                <img src="/images/logo.jpeg" alt="Logo FAST UMROH" class="logo-img">
                
                <h1 class="brand-name">FAST UMROH</h1>
                <p class="tagline">Langkah Cepat Menuju Baitullah</p>
                
                <hr style="border-color: var(--accent-blue); margin: 0 auto 2rem auto; width: 60px; border-width: 3px; opacity: 1;">

                <h2 class="main-heading">Bismillah, Website Kami Sedang Dalam Pengerjaan <span class="pulse-dot"></span></h2>
                <a href="https://wa.me/6281319554103" class="btn-contact mb-4" target="_blank">
                    <i class="fab fa-whatsapp me-2"></i> Hubungi Kami
                </a>


                <div style="font-size: 0.85rem; color: #95a5a6;">
                    &copy; 2026 FAST UMROH. All rights reserved.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
